    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const subject = getParam('subject') || 'matematicas';
      const topic = getParam('topic') || 'algebra';
      const data = subjectsData[subject] || subjectsData.matematicas;
      const topicData = data.topics[topic] || Object.values(data.topics)[0];

      document.documentElement.style.setProperty('--subject-accent', data.color);
      document.documentElement.style.setProperty('--card-accent-bg', data.color + '15');

      document.getElementById('info-subject-tag').textContent = data.tag + ' — ' + topicData.title;
      document.getElementById('info-title').textContent = topicData.title;
      document.getElementById('info-body').innerHTML = topicData.body + '<div id="topic-quiz-container" style="margin-top:32px;"></div>';
      document.getElementById('info-illustration').innerHTML = illustrations[topicData.illustration] || illustrations.math;

      if (typeof Animations !== 'undefined' && Animations.refreshScrollReveal) {
        setTimeout(() => Animations.refreshScrollReveal(), 100);
      }
      const quizSubjectMap = { espanol:'Español', etica:'Ética' };
      const quizSubject = quizSubjectMap[subject] || subject;
      setTimeout(() => {
        if (typeof QuizSystem !== 'undefined' && QuizSystem.renderTopicQuiz) {
          QuizSystem.renderTopicQuiz(quizSubject, topic, 'topic-quiz-container');
        }
      }, 200);
    });
  </script>
